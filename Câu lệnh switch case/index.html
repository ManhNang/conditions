<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="formCaculate">
        <input type="text" id="month"> <button type="submit">Tính số ngày</button><br>
        <p id="out"></p>
    </form>
    
    <script>
        const formCaculate = document.getElementById('formCaculate');

        formCaculate.addEventListener('submit',e => {
            e.preventDefault();

            const month = document.getElementById('month').value;
            const out = document.getElementById('out');
            let outDisplay = "";

            switch(parseInt(month)){
                case 1:
                case 3:
                case 5:
                case 7:
                case 8:
                case 10:
                case 12:
                    outDisplay = `Tháng ${month} có 31 ngày`;
                    break;
                case 2:
                    outDisplay = `Tháng ${month} có 28 hoặc 29 ngày`;
                    break;
                case 4:
                case 6:
                case 9:
                case 11:
                    outDisplay = `Tháng ${month} có 30 ngày`;
                    break;
                default:
                    outDisplay = "Tháng nhập vào không hợp lệ";
            }
            out.innerText = outDisplay;
        })
    </script>
</body>
</html>
