<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Good - Cheap - Fast Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toggle-container">
        <div class="toggle-row">
            <input type="checkbox" id="good" class="toggle-checkbox">
            <label for="good" class="toggle-label"></label>
            <span class="toggle-text">Good</span>
        </div>

        <div class="toggle-row">
            <input type="checkbox" id="cheap" class="toggle-checkbox">
            <label for="cheap" class="toggle-label"></label>
            <span class="toggle-text">Cheap</span>
        </div>

        <div class="toggle-row">
            <input type="checkbox" id="fast" class="toggle-checkbox">
            <label for="fast" class="toggle-label"></label>
            <span class="toggle-text">Fast</span>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
