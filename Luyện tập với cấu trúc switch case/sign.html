<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let input = Number(prompt("Nhập một số: ", 0));

        switch(input){
            case 0:
                alert(0);
                break;
            default:
                if(input > 0){
                    alert(1);
                }
                else alert(-1);
        }
    </script>
</body>
</html>
